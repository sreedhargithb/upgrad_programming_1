name: "run // .../3_4_MLR_with_Python/Multiple Linear Regression in Python/Housing+Case+Study+using+RFE (2).py"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib seaborn scikit-learn scipy statsmodels
          pip install tensorflow keras
          pip install nltk spacy gensim wordcloud
          pip install xgboost lightgbm catboost imbalanced-learn
          pip install opencv-python-headless pillow
          pip install jupyter ipython nbformat
          pip install plotly
          
          # Download NLTK data
          python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('averaged_perceptron_tagger')" || true
          
          # Download spacy model
          python -m spacy download en_core_web_sm || true

      - name: Run script
        id: run
        continue-on-error: true
        run: |
          cd "2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python"
          
          # Capture output
          python "Housing+Case+Study+using+RFE (2).py" 2>&1 | tee output.log
          
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Save output
        uses: actions/upload-artifact@v4
        with:
          name: output-Housing_Case_Study_using_RFE_2_py_e1b3792e
          path: |
            2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/output.log
            2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/*.png
            2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/*.jpg
            2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/*.csv
            2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/*.html
          retention-days: 30
          if-no-files-found: ignore

      - name: Summary
        run: |
          echo "## Script: .../3_4_MLR_with_Python/Multiple Linear Regression in Python/Housing+Case+Study+using+RFE (2).py" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: ${{ steps.run.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -50 "2_Course_continuation/_1_Exam_1/2_Machine_learning/1_Linear_regression/3_4_MLR_with_Python/Multiple Linear Regression in Python/output.log" >> $GITHUB_STEP_SUMMARY || echo "No output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
