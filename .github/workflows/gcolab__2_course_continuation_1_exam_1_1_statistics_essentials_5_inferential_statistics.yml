name: "gcolab // 2_Course_continuation/_1_Exam_1/1_Statistics_essentials/5_Inferential_statistics"

on:
  workflow_dispatch:

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Google Colab CLI
        run: pip install git+https://github.com/googlecolab/google-colab-cli

      - name: Create Patched Colab Wrapper
        run: |
          cat << 'EOF' > colab_patched.py
          import sys
          import jupyter_kernel_client.wsclient

          orig_recv_reply = jupyter_kernel_client.wsclient.KernelWebSocketClient._recv_reply
          def patched_recv_reply(self, msg_id, timeout=None):
              return orig_recv_reply(self, msg_id, timeout=None)
          jupyter_kernel_client.wsclient.KernelWebSocketClient._recv_reply = patched_recv_reply

          from colab_cli.cli import main
          if __name__ == '__main__':
              main()
          EOF

      - name: Restore Headless Google ADC Credentials
        run: |
          mkdir -p ~/.config/gcloud
          echo '${{ secrets.GCP_ADC_JSON }}' > ~/.config/gcloud/application_default_credentials.json
        shell: bash

      - name: Provision Colab session (free T4 GPU)
        run: python colab_patched.py --auth adc new -s github_job --gpu T4

      - name: Run notebooks on Colab
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          failed=0
          notebooks=(
            "2_Course_continuation/_1_Exam_1/1_Statistics_essentials/5_Inferential_statistics/Coding_questions.ipynb"
          )
          for nb in "${notebooks[@]}"; do
            echo "================================================================"
            echo "RUNNING: $nb"
            echo "================================================================"
            python colab_patched.py --auth adc exec -s github_job -f "$nb"
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "::warning::Notebook FAILED (rc=$rc): $nb"
              failed=$((failed+1))
            fi
            safe=$(echo "$nb" | sed 's#[/ ()+]#_#g' | sed 's#\.ipynb$##')
            nb_no_ext="${nb%.ipynb}"
            
            # Export executed notebook from Colab to /content/outputs/ for download
            python colab_patched.py --auth adc exec -s github_job -c "
import shutil
import os
import subprocess

# Try to get the executed notebook and save it to outputs folder
try:
    # The executed notebook is typically saved in the working directory
    nb_path = '${nb}'
    output_dir = '/content/outputs'
    os.makedirs(output_dir, exist_ok=True)
    
    # Export notebook with outputs (if available in notebook object)
    try:
        subprocess.run(['jupyter', 'nbconvert', '--to', 'notebook', '--output', f'{output_dir}/executed_notebook.ipynb', nb_path], timeout=30)
    except:
        pass
    
    print(f'Exported notebook to {output_dir}/')
except Exception as e:
    print(f'Export note: {e}')
" 2>/dev/null || true
            
            # Download outputs folder (contains executed notebook and any generated files)
            python colab_patched.py --auth adc download -s github_job /content/outputs.zip "artifacts/${safe}_outputs.zip" 2>/dev/null || true
            
            # Fallback: copy original notebook structure for reference
            cp "$nb" "artifacts/${safe}_executed.ipynb"
          done
          echo "Finished. Failed count: $failed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcolab-2_course_continuation_1_exam_1_1_statistics_essentials_5_inferential_statistics
          path: artifacts/

      - name: Hard Shutdown Cleanup
        if: always()
        run: python colab_patched.py --auth adc stop -s github_job
