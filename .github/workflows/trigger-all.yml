name: Trigger All Workflows

on:
  workflow_dispatch:

jobs:
  trigger-all-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Run GitHub CLI loop to trigger workflows
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_WORKFLOWS_PAT }}
        run: |
          CURRENT_WORKFLOW="${{ github.workflow }}"
          REPO="${{ github.repository }}"
          echo "Fetching all active workflows for $REPO..."
          
          # Added -R "$REPO" so gh knows exactly which repository to query
          workflows=$(gh workflow list -R "$REPO" --json id,name,state --limit 100)
          
          echo "$workflows" | jq -c '.[]' | while read -r row; do
            id=$(echo "$row" | jq -r '.id')
            name=$(echo "$row" | jq -r '.name')
            state=$(echo "$row" | jq -r '.state')
            
            if [ "$state" = "active" ] && [ "$name" != "$CURRENT_WORKFLOW" ]; then
              echo "🚀 Attempting to trigger: $name (ID: $id)"
              
              # Added -R "$REPO" here as well to execute the trigger target safely
              gh workflow run "$id" -R "$REPO" || echo "⚠️ Skipped $name (likely missing workflow_dispatch)"
            fi
          done