name: "gcolab // CIFAR CNN chunks 9 and 10"

# Runs the 10 CNN notebooks that used to live in trigger-all.yml chunks 9
# and 10 on Google Colab (T4 GPU) instead of the CI's 2-vCPU CPU runner,
# because 50-epoch CIFAR-10 training on CPU exceeds GitHub Actions' 6 h
# per-job cap. Each .ipynb here is a single-cell wrapper around the
# original .py file — see .github/workflows/scripts/py_to_ipynb.py.

on:
  push:
    branches:
      - main1
  workflow_dispatch:
  
jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Google Colab CLI
        run: pip install git+https://github.com/googlecolab/google-colab-cli

      - name: Create Patched Colab Wrapper
        run: |
          cat << 'EOF' > colab_patched.py
          import sys
          import jupyter_kernel_client.wsclient

          orig_recv_reply = jupyter_kernel_client.wsclient.KernelWebSocketClient._recv_reply
          def patched_recv_reply(self, msg_id, timeout=None):
              return orig_recv_reply(self, msg_id, timeout=None)
          jupyter_kernel_client.wsclient.KernelWebSocketClient._recv_reply = patched_recv_reply

          from colab_cli.cli import main
          if __name__ == '__main__':
              main()
          EOF

      - name: Create Colab Cleanup Helper
        run: |
          cat << 'EOF' > colab_cleanup.py
          """Release every Colab assignment currently held by the credential at
          $GOOGLE_APPLICATION_CREDENTIALS. Used to clear zombie sessions left
          by previous workflow runs that crashed before tearing down."""
          import os, sys
          try:
              from colab_cli.common import state
              from colab_cli.auth import AuthProvider
          except Exception as e:
              print(f"[cleanup] could not import colab_cli: {e}")
              sys.exit(0)
          state.auth_provider = AuthProvider.ADC
          try:
              assignments = state.client.list_assignments()
          except Exception as e:
              print(f"[cleanup] list_assignments failed: {e}")
              sys.exit(0)
          if not assignments:
              print("[cleanup] no active assignments to release.")
              sys.exit(0)
          released = 0
          for a in assignments:
              ep = getattr(a, "endpoint", None)
              if not ep:
                  continue
              try:
                  state.client.unassign(ep)
                  released += 1
                  print(f"[cleanup] released {ep}")
              except Exception as e:
                  print(f"[cleanup] unassign failed for {ep}: {e}")
          print(f"[cleanup] released {released} stale assignment(s).")
          EOF

      - name: Restore 3 Google ADC credentials
        shell: bash
        env:
          GCP_ADC_JSON1: ${{ secrets.GCP_ADC_JSON1 }}
          GCP_ADC_JSON2: ${{ secrets.GCP_ADC_JSON2 }}
          GCP_ADC_JSON3: ${{ secrets.GCP_ADC_JSON3 }}
        run: |
          mkdir -p ~/.config/gcloud
          printf '%s' "$GCP_ADC_JSON1" > ~/.config/gcloud/adc1.json
          printf '%s' "$GCP_ADC_JSON2" > ~/.config/gcloud/adc2.json
          printf '%s' "$GCP_ADC_JSON3" > ~/.config/gcloud/adc3.json
          for i in 1 2 3; do
            if [ ! -s ~/.config/gcloud/adc$i.json ]; then
              echo "::warning::Secret GCP_ADC_JSON$i is empty; falling back to GCP_ADC_JSON1"
              cp ~/.config/gcloud/adc1.json ~/.config/gcloud/adc$i.json
            fi
          done

      - name: Pre-flight - clear stale Colab sessions on all ADC slots
        shell: bash
        run: |
          for slot in 1 2 3; do
            echo "----- pre-flight cleanup for adc=$slot -----"
            export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/adc${slot}.json"
            python colab_cleanup.py || true
          done

      - name: Run notebooks sequentially (ADC rotated per notebook)
        shell: bash
        run: |
          mkdir -p artifacts logs
          set +e

          # Per-notebook entries; one row per notebook.
          # Format: "<path>|<profile>"   profile = long | short
          # "long"  -> try T4 GPU first, fall back to CPU
          # "short" -> CPU only (trivial print-only notebooks)
          entries=(
            "2_Course_continuation/_2_Exam_2/4_Deep_learning/_3_Convolutional_Neural_networks/_3_Building_CNNs_with_Python_and_Keras/5_+Cifar10_l2_dropout_notebook.ipynb|long"
            )

          # ----- Per-slot worker (runs in a subshell, isolated credentials) -----
          run_one() {
            local nb="$1"
            local profile="$2"
            local slot="$3"
            local session="github_job_${slot}"
            local logfile="$4"

            export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/adc${slot}.json"

            if [ "$profile" = "long" ]; then
              accelerators=(T4 CPU)
            else
              accelerators=(CPU)
            fi

            local exec_ok=0
            local acc
            for acc in "${accelerators[@]}"; do
              echo "[slot=$slot adc=$slot] try accelerator=$acc for $nb"
              python colab_patched.py --auth adc stop -s "$session" >/dev/null 2>&1 || true
              local attempt
              local new_rc=1
              for attempt in 1 2; do
                if [ "$acc" = "CPU" ]; then
                  python colab_patched.py --auth adc new -s "$session"
                else
                  python colab_patched.py --auth adc new -s "$session" --gpu "$acc"
                fi
                new_rc=$?
                if [ $new_rc -eq 0 ]; then
                  break
                fi
                echo "::warning::[slot=$slot] session create failed acc=$acc attempt=$attempt rc=$new_rc; sweeping zombies"
                python colab_cleanup.py || true
                sleep 10
              done
              if [ $new_rc -ne 0 ]; then
                echo "::warning::[slot=$slot] session create gave up acc=$acc after retry"
                continue
              fi

              python colab_patched.py --auth adc exec -s "$session" -f "$nb"
              local exec_rc=$?

              local safe
              safe=$(echo "$nb" | sed 's#[/ ()+]#_#g' | sed 's#\.ipynb$##')
              python colab_patched.py --auth adc download -s "$session" /content/outputs.zip "artifacts/${safe}_outputs.zip" 2>/dev/null || true
              # colab-cli writes the executed notebook LOCALLY on the runner as
              # <stripped>.ipynb -> <stripped>_output.ipynb in the same directory.
              local local_out
              local_out="${nb%.ipynb}_output.ipynb"
              if [ -s "$local_out" ]; then
                cp "$local_out" "artifacts/${safe}_executed.ipynb"
                echo "[slot=$slot] saved executed notebook from $local_out"
              else
                echo "::warning::[slot=$slot] missing local executed notebook $local_out (acc=$acc); falling back to source"
                cp "$nb" "artifacts/${safe}_executed.ipynb"
              fi
              python colab_patched.py --auth adc stop -s "$session" >/dev/null 2>&1 || true

              if [ $exec_rc -eq 0 ]; then
                exec_ok=1
                echo "[slot=$slot] OK on acc=$acc -- $nb"
                break
              else
                echo "::warning::[slot=$slot] exec failed acc=$acc rc=$exec_rc -- $nb"
              fi
            done

            if [ $exec_ok -ne 1 ]; then
              echo "::error::[slot=$slot] all fallbacks exhausted for $nb"
              return 1
            fi
            return 0
          }

          # ----- Sequential driver (one notebook at a time, ADC rotated per notebook) -----
          total=${#entries[@]}
          failed=0
          idx=0
          while [ $idx -lt $total ]; do
            entry="${entries[$idx]}"
            nb="${entry%%|*}"
            profile="${entry##*|}"
            # Rotate ADC slot 1 -> 2 -> 3 -> 1 -> ... across notebooks
            slot=$(( (idx % 3) + 1 ))
            safe=$(echo "$nb" | sed 's#[/ ()+]#_#g' | sed 's#\.ipynb$##')
            logfile="logs/nb$((idx+1))_slot${slot}_${safe}.log"

            echo ""
            echo "################################################################"
            echo "# NOTEBOOK $((idx+1)) / $total   adc=$slot   profile=$profile"
            echo "# $nb"
            echo "################################################################"

            run_one "$nb" "$profile" "$slot" "$logfile" > "$logfile" 2>&1
            rc=$?
            cat "$logfile"
            if [ $rc -ne 0 ]; then
              failed=$((failed+1))
            fi
            idx=$((idx+1))
          done

          echo ""
          echo "################################################################"
          echo "# Summary: $((total-failed))/$total succeeded, $failed failed"
          echo "################################################################"
          exit 0

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gcolab-cnn-chunks-9-10
          path: |
            artifacts/
            logs/

      - name: Hard Shutdown Cleanup
        if: always()
        shell: bash
        run: |
          for slot in 1 2 3; do
            export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/adc${slot}.json"
            python colab_patched.py --auth adc stop -s "github_job_${slot}" >/dev/null 2>&1 || true
          done
